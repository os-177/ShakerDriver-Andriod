name: fridge_rep_app
description: تطبيق المندوب لإدارة الثلاجات (تسجيل، عهد، طلبات صيانة، تتبع الموقع)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_localizations:
    sdk: flutter
  # طلبات HTTP + رفع ملفات (multipart) للتواصل مع نفس روابط PHP الحالية
  http: ^1.2.0
  mobile_scanner: ^5.1.1
  # اختيار صور الفاتورة/الضمان/التراخيص من المعرض أو الكاميرا
  image_picker: ^1.1.2
   
  # تحديد موقع المندوب (لتسجيل العهدة + تتبع الموقع الدوري)
  geolocator: ^12.0.0

  # عرض الباركود المُولَّد بعد تسجيل ثلاجة جديدة (بديل بسيط بدل JsBarcode)
  barcode_widget: ^2.0.4

  # تنسيق التواريخ بالعربي (لعرض تاريخ إنشاء طلبات الصيانة)
  intl: 0.18.1

  # حفظ كوكي جلسة PHP (PHPSESSID) بين الطلبات
  shared_preferences: ^2.2.3

  # فتح رابط الموقع (خرائط جوجل) لطلبات الصيانة
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assetsx/images/logo.png
    